# Copy to server/config/server.yaml on the server and adjust if needed.

host: 0.0.0.0
port: 8765
log_level: info
project_id: default

project_root: /root/quanbi
data_root: /root/quanbi/data
runtime_root: /root/quanbi/runtime/server
results_root: /root/quanbi/data/results
slice_cache_max_gb: 100

# Startup warmup (runs in background threads; /health stays responsive).
preload:
  # volumes_to_ram=true copies whole volumes into process RAM at startup (fast
  # slices, but a slow cold copy each restart and needs ~61GB free RAM).
  # volumes_to_ram=false mmaps instead: instant startup, slices served from the
  # OS page cache (RAM speed once warm); recommended when data is on a slow disk.
  volumes_to_ram: false
  # Optional RAM-backed staging dir. If set and a volume's file exists under it
  # (mirroring its data_root-relative path), the server mmaps it from RAM ("shm"
  # mode) — instant startup AND RAM-speed slices that survive server restarts.
  # Stage with: python server/scripts/stage_data_to_shm.py  (one-time copy).
  # Leave empty/comment out to always use the on-disk copy.
  stage_dir: /dev/shm/yj_studio
  # Only used when volumes_to_ram=true: restrict the RAM copy to these ids.
  warmup_volumes: []
  # Eager-load the SAM3 model onto the GPU at startup (kills first-request lag).
  warmup_model: true

auth:
  enabled: false
  token_env: YJ_STUDIO_SERVER_TOKEN

sam3:
  checkpoint: weights/sam3.pt
  source_root: libs
  device: cuda
  # Image-segmentation input size. NOTE: this does NOT affect tracking memory —
  # SAM3's video model hardcodes image_size=1008 (build_sam3_video_model), so
  # every tracked frame is resized to 1008x1008 regardless of this value or the
  # input slice size. Tracking VRAM is bounded by track_chunk below, not here.
  resolution: 1008
  load_video: true
  # Geological slice tracking uses short windows; keep natural-video
  # 15-frame hot-start suppression disabled unless explicitly testing it.
  video_temporal_disambiguation: false
  # Auto track range ("自动判断帧数"): when the client requests auto=true,
  # tracking expands outward from the seed and stops a direction once the target
  # disappears for ``auto_disappear_patience`` consecutive frames OR once this
  # HARD per-direction cap is reached — whichever comes first. The cap is a firm
  # upper bound on the free-tracking span (max this many frames forward AND this
  # many backward): when it is hit the direction stops even if the target is
  # still visible, and NO further tracking pass is started. This keeps results
  # stable, single-target, and VRAM-bounded rather than maximally long. 0/neg
  # falls back to 120 (there is no "unbounded" free-tracking mode).
  auto_track_max: 120
  auto_disappear_patience: 3
  # Drift guard for the chunk relay. Each relay chunk is re-seeded from the
  # previous chunk's last bbox; if the re-detected mask at the shared anchor
  # frame overlaps that bbox by less than this IoU, the track has drifted/split
  # onto a different region and the direction stops (surfaced as ``drift_stops``
  # so the desktop can ask the user to re-confirm). 0 disables the guard.
  track_drift_iou_min: 0.1
  # Chunked propagation = the VRAM bound. SAM3 keeps every propagated frame's
  # mask-memory on the GPU and forward+backward share one inference state, so a
  # single long propagation OOMs (~1 GB/frame at resolution 1008). Tracking
  # instead runs this many frames at a time, releases the state, and re-seeds
  # the next chunk from the last mask bbox — so peak VRAM is ONE chunk no matter
  # how far back/fwd reaches. 12 keeps a chunk well under a 24 GB card; lower it
  # if a chunk still OOMs, raise it for fewer re-seeds (slightly better
  # continuity) when you have spare VRAM.
  track_chunk: 12
  results_subdir: sam3
  gpu_ids: [0, 1, 2, 3]
  worker_count: 4
  # multi_gpu=true spawns one SAM3 worker process per gpu_id, each pinned to its
  # card (CUDA_VISIBLE_DEVICES) with its own engine. segment/track jobs run on a
  # free card; batch/infer_volume frames fan out across all cards. Workers only
  # infer — the main process persists targets under its lock. false = single
  # shared engine (legacy behaviour).
  multi_gpu: true
  target_types:
    - trap
    - turbidite
    - fault
    - sandbody
    - unknown

training:
  dataset_subdir: sam3/datasets
  models_subdir: sam3/models
  output_subdir: sam3/training_runs
  active_model: null
  # Optional. When set, /sam3/train/jobs exports the dataset, then runs this
  # command with YJ_DATASET_DIR and YJ_TRAIN_OUTPUT_DIR in the environment.
  # Placeholders are also supported:
  # command:
  #   - python
  #   - server/training/train_sam3.py
  #   - --dataset
  #   - "{dataset_dir}"
  #   - --output
  #   - "{output_dir}"
  # timeout_s: 86400

volumes:
  seismic:
    label: 地震体数据
    path: seismic/YJ-ALL-SEISMIC.npy
    cmap: Petrel
    clim: null
    # Physical spacing in metres for one voxel along axis0/axis1/sample.
    voxel_spacing_m:
      axis0: 12.5
      axis1: 12.5
      sample: 10.0

  model_lithology:
    label: 岩性模型
    path: reservoir/npy_625x625x2_v3/lithology_binary_uint8.npy
    metadata_path: reservoir/npy_625x625x2_v3/metadata.json
    cmap: lithology_binary
    clim: [-0.5, 1.5]
    mask_volume: model_porosity
    voxel_spacing_m:
      axis0: 6.25
      axis1: 6.25
      sample: 2.0

  model_porosity:
    label: 孔隙度模型
    path: reservoir/npy_625x625x2_v3/porosity_float16.npy
    metadata_path: reservoir/npy_625x625x2_v3/metadata.json
    cmap: viridis
    clim: [0.0, 0.30]
    mask_volume: model_porosity
    voxel_spacing_m:
      axis0: 6.25
      axis1: 6.25
      sample: 2.0
